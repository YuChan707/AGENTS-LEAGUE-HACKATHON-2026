# Componente Dapr Conversation -> Llama 3B DOCKERIZADO.
#
# Es el camino "Llama via dapr agents": data_processor/llm_client.py llama a
# converse_alpha1(name="llama", ...) y Dapr enruta al modelo. El contenedor
# expone un endpoint OpenAI-compatible (Ollama / llama.cpp server / vLLM),
# por eso usamos el componente conversation.openai con `endpoint` apuntando al
# contenedor en vez de a api.openai.com.
#
# Levantar el modelo (ejemplo con Ollama dockerizado):
#   docker run -d -p 11434:11434 --name llama ollama/ollama
#   docker exec -it llama ollama pull llama3.2:3b
#
# Correr el processor con el sidecar Dapr:
#   dapr run --app-id data-processor \
#            --resources-path data_processor/components \
#            -- python -m data_processor --transport dapr
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: llama
spec:
  type: conversation.openai
  version: v1
  metadata:
    - name: key
      value: "ollama"            # Ollama no valida el token; cualquier valor sirve.
    - name: model
      value: "llama3.2:3b"
    - name: endpoint
      value: "http://localhost:11434/v1"   # endpoint OpenAI-compatible del contenedor
    - name: cacheTTL
      value: "10m"
